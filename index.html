<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <style>
    :root {
      --bg-1: #f3f7ff;
      --bg-2: #edfdf7;
      --text: #0f172a;
      --muted: #475569;
      --accent: #4f46e5;
      --accent-2: #0ea5e9;
      --card: rgba(255, 255, 255, 0.82);
      --border: rgba(255, 255, 255, 0.6);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(-45deg, var(--bg-1), #fef3ff, var(--bg-2), #e0f2fe);
      background-size: 300% 300%;
      animation: gradientMove 16s ease infinite;
    }

    .container {
      width: min(760px, 100%);
      padding: 34px 32px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow:
        0 12px 40px rgba(15, 23, 42, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      animation: fadeUp 0.9s ease both;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      margin: 0 0 22px;
      font-size: 16px;
      color: var(--muted);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 12px;
    }

    li {
      position: relative;
      padding: 14px 16px 14px 46px;
      font-size: 18px;
      line-height: 1.45;
      color: #1e293b;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.25);
      transform: translateX(0);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      animation: itemIn 0.6s ease both;
    }

    li:nth-child(2) {
      animation-delay: 0.12s;
    }

    li:nth-child(3) {
      animation-delay: 0.24s;
    }

    li::before {
      content: "✨";
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      transition: transform 0.25s ease;
    }

    li:hover {
      transform: translateX(6px);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 10px 22px rgba(79, 70, 229, 0.14);
    }

    li:hover::before {
      transform: translateY(-50%) scale(1.15) rotate(-8deg);
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes itemIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Генератор идей для постов</h1>
    <p class="subtitle">Быстрые идеи, чтобы упростить планирование контента</p>
    <ul>
      <li>5 идей постов для экспертов</li>
      <li>3 идеи сторис на сегодня</li>
      <li>Контент-план на неделю</li>
    </ul>
  </main>
</body>
</html>
